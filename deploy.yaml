---
- name: Deploy application
  hosts: all
  become: yes

  tasks:
    - name: Install nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Deploy website
      copy:
        content: |
          <html>
          <body>
          <h1>Deployment from AWX Successful</h1>
          </body>
          </html>
        dest: /var/www/html/index.html

    - name: Verify service
      service:
        name: nginx
        state: started
